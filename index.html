<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Holdings Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <div id="sidebar" class="sidebar">
    <button id="closeSidebar">✕</button>
    <div class="handle-group">
      <p class="handle" data-handle="elon">elon</p>
      <p class="handle" data-handle="buffett">buffett</p>
      <div class="divider"></div>
      <p class="handle"  data-handle="yourhandle">yourhandle</p>
      <div class="divider"></div>
      <!-- Settings Button -->
      <p id="openSettings" class="settings-btn">⚙️ Settings</p>
      
      <!-- Settings Modal -->
      <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
          <h2>Settings</h2>
      
          <!-- Theme Toggle -->
          <div class="setting-item">
            <label class="switch">
              <input type="checkbox" id="themeToggle">
              <span class="slider round"></span>
            </label>
            <span>Dark Mode</span>
          </div>
      
          <!-- Accounts -->
          <div class="setting-section">
            <strong>Accounts</strong>
            <p>Robinhood</p>
            <p>Chase</p>
            <button id="connectPlaid">Connect Account with Plaid</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="topbar">
    <button id="menuToggle">☰</button>
    <h1 id="pageTitle">yourhandle</h1>
  </div>

  <div id="main"></div>
</div>
  <script src="script.js"></script>
</body>
</html>
