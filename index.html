<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Investment Holdings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #f5f5f5;
    }
    tr:hover {
      background-color: #f0f8ff;
    }
  </style>
</head>
<body>
  <h1>My Investment Holdings</h1>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Ticker</th>
        <th>Shares</th>
        <th>Price</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Apple Inc.</td>
        <td>AAPL</td>
        <td>50</td>
        <td>$180.00</td>
        <td>$9,000</td>
      </tr>
      <tr>
        <td>Amazon.com</td>
        <td>AMZN</td>
        <td>10</td>
        <td>$150.00</td>
        <td>$1,500</td>
      </tr>
      <tr>
        <td>Google</td>
        <td>GOOGL</td>
        <td>5</td>
        <td>$2800.00</td>
        <td>$14,000</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
